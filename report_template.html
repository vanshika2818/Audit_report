<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Business Audit Report</title>
    <style>
        @page {
            size: A4;
            margin: 2.5cm;
            @top-right {
                content: "Business Audit Report";
                font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                font-size: 9pt;
                color: #7f8c8d;
            }
            @bottom-center {
                content: "Page " counter(page);
                font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                font-size: 9pt;
                color: #7f8c8d;
            }
        }
        
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #333333;
            line-height: 1.6;
            font-size: 11pt;
        }

        .header {
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #2c3e50;
        }

        .header h1 {
            font-size: 24pt;
            color: #2c3e50;
            margin: 0 0 15px 0;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .metadata-table {
            width: 100%;
            font-size: 10pt;
            color: #555;
            border-collapse: collapse;
        }
        
        .metadata-table td {
            padding: 2px 0;
        }
        
        .metadata-table strong {
            color: #2c3e50;
            display: inline-block;
            width: 120px;
        }

        .content {
            margin-top: 30px;
        }

        h1, h2, h3 {
            color: #2c3e50;
            font-weight: 600;
        }

        .content h1 {
            font-size: 18pt;
            margin-top: 30px;
            margin-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 5px;
        }

        .content h2 {
            font-size: 14pt;
            margin-top: 25px;
            margin-bottom: 10px;
        }

        .content h3 {
            font-size: 12pt;
            margin-top: 20px;
        }
        
        p {
            margin-bottom: 12px;
            text-align: justify;
        }

        ul, ol {
            margin-bottom: 15px;
            padding-left: 20px;
        }
        
        li {
            margin-bottom: 6px;
        }

        hr {
            border: 0;
            border-top: 1px solid #e0e0e0;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Tech & Business Audit Report</h1>
        <table class="metadata-table">
            <tr>
                <td><strong>Prepared For:</strong> {{ name }}</td>
                <td style="text-align: right;"><strong>Date:</strong> {{ date }}</td>
            </tr>
            <tr>
                <td><strong>Target Domain:</strong> {{ company_domain }}</td>
                <td></td>
            </tr>
        </table>
    </div>

    <div class="content">
        <!-- LLM Generated Content injected here -->
        {{ company_info_html | safe }}
    </div>

</body>
</html>
